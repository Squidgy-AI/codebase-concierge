services:
  - type: web
    name: codebase-concierge
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      mkdir -p "${REPOS_DIR:-repos}"
      # Clone every repo declared in NIA_REPOS so git blame works for cited files.
      # Private repos will fail silently; they can still be answered (just no engineer attribution).
      for entry in $(echo "${NIA_REPOS:-}" | tr ',' ' '); do
        repo_name="${entry##*/}"
        target="${REPOS_DIR:-repos}/$repo_name"
        if [ -n "$repo_name" ] && [ ! -d "$target/.git" ]; then
          echo "[build] cloning $entry → $target"
          git clone --depth=300 "https://github.com/$entry.git" "$target" || echo "[build] clone failed (private repo? check GITHUB_TOKEN)"
        fi
      done
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NIA_API_KEY
        sync: false
      - key: AGENTMAIL_API_KEY
        sync: false
      - key: AGENTMAIL_INBOX_ID
        sync: false
      - key: NIA_REPOS
        sync: false
      - key: NIA_DATA_SOURCES
        sync: false
      - key: AUTO_CC_DOMAINS
        value: users.noreply.github.com
      - key: REPOS_DIR
        value: repos
      - key: SENDER_MODES
        sync: false
      - key: CACHE_DB_PATH
        value: /disk/cache.db
      - key: ADMIN_PASSWORD
        sync: false
