services:
  - type: web
    name: codebase-concierge
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      mkdir -p repos
      [ -d repos/hono ] || git clone --depth=300 https://github.com/honojs/hono.git repos/hono
      [ -d repos/node-server ] || git clone --depth=300 https://github.com/honojs/node-server.git repos/node-server
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NIA_API_KEY
        sync: false
      - key: AGENTMAIL_API_KEY
        sync: false
      - key: AGENTMAIL_INBOX_ID
        sync: false
      - key: NIA_REPOS
        sync: false
      - key: NIA_DATA_SOURCES
        sync: false
      - key: AUTO_CC_DOMAINS
        value: users.noreply.github.com
      - key: REPOS_DIR
        value: repos
      - key: SENDER_MODES
        sync: false
